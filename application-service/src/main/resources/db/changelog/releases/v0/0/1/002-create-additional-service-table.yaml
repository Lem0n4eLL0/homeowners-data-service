databaseChangeLog:
  - changeSet:
      id: 002-create-additional-service
      author: CatCus12
      changes:
        - createTable:
            tableName: additional_service
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: "CURRENT_TIMESTAMP"
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: "CURRENT_TIMESTAMP"
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: title
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: false
              - column:
                  name: description
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: false
              - column:
                  name: price
                  type: int
                  constraints:
                    nullable: false
                    unique: false




