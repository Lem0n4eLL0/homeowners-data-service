databaseChangeLog:
  - changeSet:
      id: 001-create-application-table
      author: CatCus12
      changes:
        - createTable:
            tableName: order_additional_service
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: "CURRENT_TIMESTAMP"
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: "CURRENT_TIMESTAMP"
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: account_id
                  type: UUID
                  constraints:
                    nullable: false
                    unique: false
              - column:
                  name: property_id
                  type: UUID
                  constraints:
                    nullable: false
                    unique: false
              - column:
                  name: additional_service_id
                  type: UUID
                  constraints:
                    nullable: false
                    unique: false
              - column:
                  name: status
                  type: VARCHAR(50)
                  defaultValue: PENDING

        - createIndex:
            tableName: application
            columns:
              - column:
                  name: account_id
            indexName: idx_order_application_account_id
        - createIndex:
            tableName: application
            columns:
              - column:
                  name: property_id
            indexName: idx_order_application_property_id

        - createIndex:
            tableName: order_additional_service
            columns:
              - column:
                  name: additional_service_id
            indexName: idx_order_additional_services_additional_service_id

