databaseChangeLog:
  - changeSet:
      id: 004-fix-indexes-order-additional-service
      author: CatCus12
      changes:
        - dropIndex:
            indexName: idx_order_application_account_id
            tableName: application
        - dropIndex:
            indexName: idx_order_application_property_id
            tableName: application
        - createIndex:
            tableName: order_additional_service
            indexName: idx_order_additional_service_account_id
            columns:
              - column:
                  name: account_id

        - createIndex:
            tableName: order_additional_service
            indexName: idx_order_additional_service_property_id
            columns:
              - column:
                  name: property_id

      onError: CONTINUE