# docker-compose.prod.yml
version: "3.9"

services:
  # === API Gateway ===
  api-gateway:
    image: ghcr.io/${GHCR_OWNER:-your-username}/api-gateway:${TAG:-latest}
    build: null  # отключаем сборку в проде
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"  # только localhost для Nginx
    networks:
      - internal

  # === Auth Service ===
  authentication-service:
    image: ghcr.io/${GHCR_OWNER:-your-username}/authentication-service:${TAG:-latest}
    build: null
    restart: unless-stopped
    networks:
      - internal

  # === SMTP Service ===
  notification-service:
    image: ghcr.io/${GHCR_OWNER:-your-username}/notification-service:${TAG:-latest}
    build: null
    restart: unless-stopped
    networks:
      - internal

  # === Homeowners Service ===
  homeowners-service:
    image: ghcr.io/${GHCR_OWNER:-your-username}/homeowners-service:${TAG:-latest}
    build: null
    restart: unless-stopped
    networks:
      - internal

  # === pgAdmin (без проброса порта — доступ через Nginx) ===
  pgadmin:
    ports: []  # убираем 8099:80
    restart: unless-stopped
    networks:
      - internal

  # === Kafka UI (без проброса порта — доступ через Nginx) ===
  kafka-ui:
    ports: []  # убираем 8089:8080
    restart: unless-stopped
    networks:
      - internal
