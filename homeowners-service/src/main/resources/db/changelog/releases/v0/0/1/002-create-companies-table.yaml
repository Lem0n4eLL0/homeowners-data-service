databaseChangeLog:
  - changeSet:
      id: 002-create-companies-table-homeowners-service
      author: zeker
      changes:
        - createTable:
            tableName: companies
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_companies
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: bigint
                  constraints:
                    nullable: false
        - createIndex:
            indexName: uk_companies_name
            tableName: companies
            columns:
              - column:
                  name: name
            unique: true
