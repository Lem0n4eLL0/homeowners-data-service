databaseChangeLog:
  - changeSet:
      id: 004-create-services-table-homeowners-service
      author: zeker
      changes:
        - createTable:
            tableName: services
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_services
              - column:
                  name: code
                  type: varchar(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: bigint
                  constraints:
                    nullable: false
        - createIndex:
            indexName: uk_services_code
            tableName: services
            columns:
              - column:
                  name: code
            unique: true
