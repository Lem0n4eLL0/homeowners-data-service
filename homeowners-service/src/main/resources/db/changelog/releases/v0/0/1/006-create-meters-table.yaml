databaseChangeLog:
  - changeSet:
      id: 006-create-meters-table-homeowners-service
      author: zeker
      changes:
        - createTable:
            tableName: meters
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_meters
              - column:
                  name: serial_number
                  type: varchar(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: type
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: personal_account_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: bigint
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseColumnNames: personal_account_id
            baseTableName: meters
            constraintName: fk_meters_personal_account_id
            referencedColumnNames: id
            referencedTableName: personal_accounts
        - createIndex:
            indexName: uk_meters_serial_number
            tableName: meters
            columns:
              - column:
                  name: serial_number
            unique: true
        - createIndex:
            indexName: idx_meters_personal_account_id
            tableName: meters
            columns:
              - column:
                  name: personal_account_id
        - createIndex:
            indexName: idx_meters_type
            tableName: meters
            columns:
              - column:
                  name: type
