databaseChangeLog:
  - changeSet:
      id: 007-create-meter-history-values-table-homeowners-service
      author: zeker
      changes:
        - createTable:
            tableName: meter_history_values
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_meter_history_values
              - column:
                  name: meter_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: value
                  type: decimal(15, 4)
                  constraints:
                    nullable: false
              - column:
                  name: date
                  type: date
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: bigint
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseColumnNames: meter_id
            baseTableName: meter_history_values
            constraintName: fk_meter_history_values_meter_id
            referencedColumnNames: id
            referencedTableName: meters
        - createIndex:
            indexName: idx_meter_history_values_meter_id
            tableName: meter_history_values
            columns:
              - column:
                  name: meter_id
        - createIndex:
            indexName: idx_meter_history_values_date
            tableName: meter_history_values
            columns:
              - column:
                  name: date
        - createIndex:
            indexName: uk_meter_history_values_meter_date
            tableName: meter_history_values
            columns:
              - column:
                  name: meter_id
              - column:
                  name: date
            unique: true
