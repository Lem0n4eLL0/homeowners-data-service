databaseChangeLog:
  - changeSet:
      id: 009-alter-property-memberships-table
      author: CatCus12
      changes:
        - addColumn:
            tableName: property_memberships
            columns:
              - column:
                  name: verification_status
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: verified_at
                  type: timestamp
                  constraints:
                    nullable: true
              - column:
                  name: rejection_reason
                  type: text
                  constraints:
                    nullable: true
        - dropColumn:
            tableName: property_memberships
            columnName: role